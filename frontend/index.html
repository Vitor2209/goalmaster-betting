<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GoalMaster - Virtual Coin Football Betting Platform">
  <title>GoalMaster - Football Betting</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Inter:wght@400;500;600&family=Chakra+Petch:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
  <!-- Header -->
  <header class="header" data-testid="header">
    <div class="header-container">
      <a href="index.html" class="logo" data-testid="logo">
        <div class="logo-icon">⚽</div>
        <div>
          <div class="logo-text">GoalMaster</div>
          <div class="logo-tagline">Bet. Play. Win.</div>
        </div>
      </a>
      
      <nav class="nav-menu" data-testid="nav-menu">
        <a href="index.html" class="nav-link active" data-testid="nav-home">Home</a>
        <a href="pages/matches.html" class="nav-link" data-testid="nav-matches">Matches</a>
        <a href="pages/leaderboard.html" class="nav-link" data-testid="nav-leaderboard">Leaderboard</a>
        <a href="pages/account.html" class="nav-link" data-testid="nav-account">My Account</a>
      </nav>
      
      <div class="header-right">
        <div class="coin-balance" data-testid="coin-balance">
          <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" alt="coins" class="coin-icon">
          <div>
            <span class="coin-amount" data-testid="coin-amount">0</span>
            <span class="coin-label"> coins</span>
          </div>
        </div>
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=guest" alt="User" class="user-avatar" data-testid="user-avatar" onclick="window.location.href='/account.html'" style="display: none;">
        <button class="btn btn-secondary" data-testid="auth-btn" onclick="window.location.href='/login.html'" style="padding: 8px 16px;">Login</button>
        <button class="mobile-menu-btn" data-testid="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <div class="main-layout">
      <!-- Main Content Area -->
      <div class="main-content">
        <!-- Featured Match Hero Banner -->
        <div id="featured-match" data-testid="featured-match-container">
          <!-- Rendered by JS -->
          <div class="loading"><div class="loading-spinner"></div></div>
        </div>

        <!-- Live & Upcoming Matches Section -->
        <section data-testid="matches-section">
          <div class="section-header">
            <h2 class="section-title">
              <span class="live-indicator"></span>
              Live & Upcoming
            </h2>
            <a href="pages/matches.html" class="section-link" data-testid="view-all-matches">
              View All →
            </a>
          </div>
          
          <div id="matches-grid" class="matches-grid" data-testid="matches-grid">
            <!-- Rendered by JS -->
            <div class="loading" style="grid-column: 1 / -1;"><div class="loading-spinner"></div></div>
          </div>
        </section>
      </div>

      <!-- Sidebar -->
      <aside class="sidebar" data-testid="sidebar">
        <!-- Bet Slip -->
        <div class="betslip" data-testid="betslip">
          <div class="betslip-header">
            <span class="betslip-title">Bet Slip</span>
            <a href="pages/account.html" class="betslip-link" data-testid="my-bets-link">My Bets →</a>
          </div>
          <div class="betslip-content" data-testid="betslip-content">
            <!-- Rendered by JS -->
          </div>
        </div>

        <!-- Mini Leaderboard -->
        <div id="leaderboard-mini" data-testid="leaderboard-mini-container">
          <!-- Rendered by JS -->
        </div>
      </aside>

      <!-- Sidebar Overlay (mobile) -->
      <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    </div>
  </main>

  <!-- Mobile Bet Slip Toggle -->
  <button class="btn btn-primary" data-testid="mobile-betslip-btn" onclick="toggleSidebar()" style="position: fixed; bottom: 20px; right: 20px; z-index: 97; display: none; border-radius: 50%; width: 60px; height: 60px; padding: 0;">
    🎫
  </button>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/betslip.js"></script>
  <script src="js/matches.js"></script>
  <script src="js/main.js"></script>
  
  <script>
    // Page-specific initialization
    document.addEventListener('DOMContentLoaded', async () => {
      // Render featured match
      await Matches.renderFeaturedMatch('featured-match');
      
      // Render match cards
      await Matches.renderMatchCards('matches-grid');
      
      // Render mini leaderboard
      await Leaderboard.renderMini('leaderboard-mini');
      
      // Show mobile bet slip button on smaller screens
      const mediaQuery = window.matchMedia('(max-width: 1024px)');
      const mobileBetslipBtn = document.querySelector('[data-testid="mobile-betslip-btn"]');
      if (mobileBetslipBtn) {
        mobileBetslipBtn.style.display = mediaQuery.matches ? 'flex' : 'none';
        mediaQuery.addEventListener('change', (e) => {
          mobileBetslipBtn.style.display = e.matches ? 'flex' : 'none';
        });
      }
    });
  </script>
</body>
</html>
