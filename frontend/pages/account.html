<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GoalMaster - My Account">
  <title>My Account - GoalMaster</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Inter:wght@400;500;600&family=Chakra+Petch:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="../css/styles.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
  <!-- Header -->
  <header class="header" data-testid="header">
    <div class="header-container">
      <a href="../index.html" class="logo" data-testid="logo">
        <div class="logo-icon">⚽</div>
        <div>
          <div class="logo-text">GoalMaster</div>
          <div class="logo-tagline">Bet. Play. Win.</div>
        </div>
      </a>
      
      <nav class="nav-menu" data-testid="nav-menu">
        <a href="../index.html" class="nav-link" data-testid="nav-home">Home</a>
        <a href="matches.html" class="nav-link" data-testid="nav-matches">Matches</a>
        <a href="leaderboard.html" class="nav-link" data-testid="nav-leaderboard">Leaderboard</a>
        <a href="account.html" class="nav-link active" data-testid="nav-account">My Account</a>
      </nav>
      
      <div class="header-right">
        <div class="coin-balance" data-testid="coin-balance">
          <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" alt="coins" class="coin-icon">
          <div>
            <span class="coin-amount" data-testid="coin-amount">0</span>
            <span class="coin-label"> coins</span>
          </div>
        </div>
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=guest" alt="User" class="user-avatar" data-testid="user-avatar" onclick="window.location.href='/account.html'" style="display: none;">
        <button class="btn btn-secondary" data-testid="auth-btn" onclick="window.location.href='/login.html'" style="padding: 8px 16px;">Login</button>
        <button class="mobile-menu-btn" data-testid="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <div class="account-page" data-testid="account-page">
      <div id="account-content" data-testid="account-content">
        <!-- Rendered by JS -->
        <div class="loading"><div class="loading-spinner"></div></div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/betslip.js"></script>
  <script src="../js/matches.js"></script>
  <script src="../js/main.js"></script>
  
  <script>
    // Page-specific initialization
    document.addEventListener('DOMContentLoaded', async () => {
      // Render account page
      await Account.render('account-content');
    });
  </script>
</body>
</html>
