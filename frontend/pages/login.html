<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GoalMaster - Login">
  <title>Login - GoalMaster</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Inter:wght@400;500;600&family=Chakra+Petch:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="../css/styles.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
  <div class="auth-page" data-testid="auth-page">
    <div class="auth-container" data-testid="auth-container">
      <div class="auth-logo">
        <a href="../index.html" class="logo" style="justify-content: center;">
          <div class="logo-icon">⚽</div>
          <div>
            <div class="logo-text">GoalMaster</div>
            <div class="logo-tagline">Bet. Play. Win.</div>
          </div>
        </a>
      </div>
      
      <!-- Login Form -->
      <div id="login-form" data-testid="login-form">
        <h2 class="auth-title">Welcome Back</h2>
        
        <div id="login-error" class="auth-error hidden" data-testid="login-error"></div>
        
        <form class="auth-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input 
              type="email" 
              id="login-email" 
              class="form-input" 
              placeholder="your@email.com"
              required
              data-testid="login-email-input"
            >
          </div>
          
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input 
              type="password" 
              id="login-password" 
              class="form-input" 
              placeholder="Enter your password"
              required
              data-testid="login-password-input"
            >
          </div>
          
          <button type="submit" class="auth-submit" data-testid="login-submit">
            Login
          </button>
        </form>
        
        <p class="auth-switch">
          Don't have an account? <a href="#" onclick="showRegister()" data-testid="show-register">Sign up</a>
        </p>
      </div>
      
      <!-- Register Form -->
      <div id="register-form" class="hidden" data-testid="register-form">
        <h2 class="auth-title">Create Account</h2>
        
        <div id="register-error" class="auth-error hidden" data-testid="register-error"></div>
        
        <form class="auth-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label" for="register-username">Username</label>
            <input 
              type="text" 
              id="register-username" 
              class="form-input" 
              placeholder="Choose a username"
              required
              minlength="3"
              data-testid="register-username-input"
            >
          </div>
          
          <div class="form-group">
            <label class="form-label" for="register-email">Email</label>
            <input 
              type="email" 
              id="register-email" 
              class="form-input" 
              placeholder="your@email.com"
              required
              data-testid="register-email-input"
            >
          </div>
          
          <div class="form-group">
            <label class="form-label" for="register-password">Password</label>
            <input 
              type="password" 
              id="register-password" 
              class="form-input" 
              placeholder="Create a password"
              required
              minlength="6"
              data-testid="register-password-input"
            >
          </div>
          
          <button type="submit" class="auth-submit" data-testid="register-submit">
            Create Account
          </button>
        </form>
        
        <p class="auth-switch">
          Already have an account? <a href="#" onclick="showLogin()" data-testid="show-login">Login</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  
  <script>
    // Check if already logged in
    if (Auth.isLoggedIn()) {
      const redirect = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
      window.location.href = redirect;
    }

    // Show login form
    function showLogin() {
      document.getElementById('login-form').classList.remove('hidden');
      document.getElementById('register-form').classList.add('hidden');
    }

    // Show register form
    function showRegister() {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('register-form').classList.remove('hidden');
    }

    // Handle login
    async function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      
      errorEl.classList.add('hidden');
      
      try {
        await Auth.login(email, password);
        Toast.show('Login successful!', 'success');
        
        // Redirect
        const redirect = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
        setTimeout(() => {
          window.location.href = redirect;
        }, 500);
      } catch (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
      }
    }

    // Handle register
    async function handleRegister(event) {
      event.preventDefault();
      
      const username = document.getElementById('register-username').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const errorEl = document.getElementById('register-error');
      
      errorEl.classList.add('hidden');
      
      try {
        await Auth.register(username, email, password);
        Toast.show('Account created! You received 1000 coins!', 'success');
        
        // Redirect
        const redirect = new URLSearchParams(window.location.search).get('redirect') || '/index.html';
        setTimeout(() => {
          window.location.href = redirect;
        }, 500);
      } catch (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
